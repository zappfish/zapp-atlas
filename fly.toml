app = 'zapp-atlas'
primary_region = 'sjc'

[build]

[env]
  ZAPP_DB_PATH = '/data/zapp.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  timeout = '5s'

[mounts]
  source = 'zapp_data'
  destination = '/data'
