[project]
name = "zapp-atlas"
version = "0.1.0"
description = "Server and utilities for the ZAPP atlas"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "flask>=3.1.2",
    "sqlalchemy>=2.0",
    "linkml",
    "fastapi>=0.135.2",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.15.8",
]

[tool.uv.sources]
linkml = { git = "https://github.com/linkml/linkml", branch = "feat/sqla-2x-declarative", subdirectory = "packages/linkml" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zapp_atlas"]

[tool.pytest.ini_options]
pythonpath = ["src"]
